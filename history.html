<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Device History</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="p-4 bg-light">

<div class="container-fluid">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 id="title"></h3>
    <input type="date" id="datePicker" class="form-control" style="width: 220px;" />
  </div>

  <!-- Loading / error banners -->
  <div id="loadingMsg" class="alert alert-info d-none">Loading…</div>
  <div id="errorMsg"   class="alert alert-danger d-none"></div>
  <div id="emptyMsg"   class="alert alert-warning d-none">No data found for this date.</div>

  <div class="card p-3 mb-4" id="tempCard">
    <h5>Temperature</h5>
    <div style="height:400px;">
      <canvas id="tempChart"></canvas>
    </div>
  </div>

  <div class="card p-3" id="humidityCard">
    <h5>Humidity</h5>
    <div style="height:400px;">
      <canvas id="humChart"></canvas>
    </div>
  </div>

</div>

<script>
// ─── MAC from URL ────────────────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const mac    = params.get("mac") || "";
document.getElementById("title").innerText = `History – ${mac}`;

let tempChart = null;
let humChart  = null;

// ─── TIMESTAMP HELPER ────────────────────────────────────────────────────────
// Your Cloudflare worker stores `ts` as Unix seconds (not ms).
// Detect automatically: if < 1e12 it is seconds, multiply by 1000.
function toMs(ts) {
  return ts < 1_000_000_000_000 ? ts * 1000 : ts;
}

function toTime(ts) {
  return new Date(toMs(ts)).toLocaleTimeString([], {
    hour:   '2-digit',
    minute: '2-digit',
    second: '2-digit'
  });
}

function toDateStr(ts) {
  const d  = new Date(toMs(ts));
  const yy = d.getFullYear();
  const mm  = String(d.getMonth() + 1).padStart(2, "0");
  const dd  = String(d.getDate()).padStart(2, "0");
  return `${yy}-${mm}-${dd}`;
}

// ─── FETCH + FILTER ──────────────────────────────────────────────────────────
async function loadHistory() {
  const selectedDate = document.getElementById("datePicker").value;

  document.getElementById("loadingMsg").classList.remove("d-none");
  document.getElementById("errorMsg").classList.add("d-none");
  document.getElementById("emptyMsg").classList.add("d-none");

  let data;
  try {
    const res = await fetch(
      `https://fc-dashboard-worker.satyaramsl72.workers.dev/device/${mac}`
    );
    data = await res.json();
  } catch (e) {
    document.getElementById("loadingMsg").classList.add("d-none");
    const el = document.getElementById("errorMsg");
    el.textContent = `Network error: ${e.message}`;
    el.classList.remove("d-none");
    return;
  }

  document.getElementById("loadingMsg").classList.add("d-none");

  if (!Array.isArray(data) || data.length === 0) {
    document.getElementById("emptyMsg").classList.remove("d-none");
    return;
  }

  // Worker returns newest-first (ORDER BY received_at DESC) → reverse to oldest-first for chart
  data.reverse();

  // Filter by selected date using corrected ms timestamps
  if (selectedDate) {
    data = data.filter(row => toDateStr(row.received_at) === selectedDate);
  }

  if (data.length === 0) {
    document.getElementById("emptyMsg").classList.remove("d-none");
    destroyCharts();
    return;
  }

  renderCharts(data);
}

// ─── DESTROY HELPERS ─────────────────────────────────────────────────────────
function destroyCharts() {
  if (tempChart) { tempChart.destroy(); tempChart = null; }
  if (humChart)  { humChart.destroy();  humChart  = null; }
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderCharts(data) {
  destroyCharts();

  const extRows = data.filter(r => r.temperature          != null && !isNaN(r.temperature));
  const intRows = data.filter(r => r.internal_temperature != null && !isNaN(r.internal_temperature));
  const humRows = data.filter(r => r.humidity             != null && !isNaN(r.humidity));

  // Prefer external temperature; fall back to internal
  const useExternal = extRows.length > 0;
  const tempRows    = useExternal ? extRows : intRows;
  const tempField   = useExternal ? "temperature" : "internal_temperature";

  console.log("renderCharts →", { extRows, intRows, tempRows, humRows });

  // ── Temperature chart ──────────────────────────────────────────────────────
  if (tempRows.length > 0) {
    document.getElementById("tempCard").style.display = "block";

    tempChart = new Chart(document.getElementById("tempChart"), {
      type: "line",
      data: {
        labels:   tempRows.map(r => toTime(r.received_at)),
        datasets: [{
          label:                "Temperature (°C)",
          data:                 tempRows.map(r => r[tempField]),
          borderColor:          "red",
          backgroundColor:      "rgba(255,0,0,0.15)",
          fill:                 true,
          tension:              tempRows.length > 1 ? 0.3 : 0,
          showLine:             true,
          pointRadius:          6,
          pointHoverRadius:     8,
          pointBackgroundColor: "red",
          pointBorderColor:     "#fff",
          pointBorderWidth:     2,
        }]
      },
      options: {
        responsive:          true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: true },
          tooltip: {
            callbacks: {
              label: ctx => ` ${ctx.parsed.y.toFixed(2)} °C`
            }
          }
        },
        scales: {
          x: { ticks: { maxTicksLimit: 12, autoSkip: true, maxRotation: 30 } },
          y: { ticks: { callback: v => v.toFixed(2) + " °C" } }
        }
      }
    });
  } else {
    document.getElementById("tempCard").style.display = "none";
  }

  // ── Humidity chart ─────────────────────────────────────────────────────────
  if (humRows.length > 0) {
    document.getElementById("humidityCard").style.display = "block";

    humChart = new Chart(document.getElementById("humChart"), {
      type: "line",
      data: {
        labels:   humRows.map(r => toTime(r.received_at)),
        datasets: [{
          label:                "Humidity (%)",
          data:                 humRows.map(r => r.humidity),
          borderColor:          "blue",
          backgroundColor:      "rgba(0,0,255,0.15)",
          fill:                 true,
          tension:              humRows.length > 1 ? 0.3 : 0,
          showLine:             true,
          pointRadius:          6,
          pointHoverRadius:     8,
          pointBackgroundColor: "blue",
          pointBorderColor:     "#fff",
          pointBorderWidth:     2,
        }]
      },
      options: {
        responsive:          true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: true },
          tooltip: {
            callbacks: {
              label: ctx => ` ${ctx.parsed.y.toFixed(2)} %`
            }
          }
        },
        scales: {
          x: { ticks: { maxTicksLimit: 12, autoSkip: true, maxRotation: 30 } },
          y: { ticks: { callback: v => v.toFixed(2) + " %" } }
        }
      }
    });
  } else {
    document.getElementById("humidityCard").style.display = "none";
  }
}

// ─── DEFAULT DATE = TODAY ────────────────────────────────────────────────────
document.getElementById("datePicker").value =
  new Date().toISOString().split("T")[0];

// ─── EVENTS ──────────────────────────────────────────────────────────────────
document.getElementById("datePicker").addEventListener("change", loadHistory);

// ─── INIT ────────────────────────────────────────────────────────────────────
loadHistory();
</script>

</body>
</html>
